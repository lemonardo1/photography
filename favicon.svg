<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0c0c0c"/>
  <!-- Aperture blades -->
  <g transform="translate(16,16)" stroke="#c8a96e" stroke-width="1.4" stroke-linecap="round" fill="none">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="10" stroke-opacity="0.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="4"/>
    <!-- Blades (6) -->
    <line x1="0" y1="-4"  x2="-3.46" y2="-8"  />
    <line x1="3.46" y1="-2" x2="3.46" y2="-8.66"/>
    <line x1="3.46" y1="2"  x2="8.66" y2="3.46" />
    <line x1="0"    y1="4"  x2="3.46" y2="8"    />
    <line x1="-3.46" y1="2" x2="-3.46" y2="8.66"/>
    <line x1="-3.46" y1="-2" x2="-8.66" y2="-3.46"/>
  </g>
</svg>
